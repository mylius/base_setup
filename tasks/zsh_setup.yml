- name: Check that the somefile.conf exists
  stat:
    path: "/home/{{ user_name }}/.oh-my-zsh"
  register: oh_my_stats
  tags: terminal

- name: Install oh-my-zsh
  become_user: "{{ user_name }}"
  shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
  args:
    creates: "/home/{{ user_name }}/.oh-my-zsh"

- name: Ensure .zshrc exists
  copy:
    src: "/home/{{ user_name }}/.oh-my-zsh/templates/zshrc.zsh-template"
    dest: "/home/{{ user_name }}/.zshrc"
    remote_src: yes
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0644'

- name: Source .zshrc
  become_user: "{{ user_name }}"
  shell: |
    source ~/.zshrc
  args:
    executable: /bin/zsh

- name: Ensure zsh plugin directory exists
  ansible.builtin.file:
    path: "/home/{{ user_name }}/.zsh"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0755'
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Install zsh-autosuggestions
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    dest: "/home/{{ user_name }}/.zsh/zsh-autosuggestions"
    update: yes
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Install zsh-syntax-highlighting
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: "/home/{{ user_name }}/.zsh/zsh-syntax-highlighting"
    update: yes
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
