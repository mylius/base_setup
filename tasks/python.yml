- name: Download Miniconda installer
  ansible.builtin.get_url:
    url: https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
    dest: "/home/{{ user_name }}/Miniconda3-latest-Linux-x86_64.sh"
    mode: '0755'
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  tags:
    - python

- name: Install Miniconda
  command: "/home/{{ user_name }}/Miniconda3-latest-Linux-x86_64.sh -b -p /home/{{ user_name }}/miniconda3"
  args:
    creates: "/home/{{ user_name }}/miniconda3/bin/conda"
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  tags:
    - python

- name: Source .zshrc
  command: zsh -c 'source /home/{{ user_name }}/.zshrc'
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Create Conda environment
  command: /home/{{ user_name }}/miniconda3/bin/conda create -y -n zufall python=3.12
  args:
    creates: /home/{{ user_name }}/miniconda3/envs/zufall
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  tags:
    - python

- name: Install packages in Conda environment
  command: /home/{{ user_name }}/miniconda3/bin/conda install -y -n zufall pydantic fastapi
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  tags:
    - python
