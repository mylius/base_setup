- name: Check if .dotfiles directory exists
  stat:
    path: "/home/{{ user_name }}/.dotfiles"
  register: dotfiles_dir
  tags:
    - install
    - dotfiles
    - stow

- name: Check whether .dotfiles has local changes
  ansible.builtin.command:
    argv:
      - git
      - -C
      - "/home/{{ user_name }}/.dotfiles"
      - status
      - --porcelain
  register: dotfiles_status
  changed_when: false
  when: dotfiles_dir.stat.exists
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  environment:
    HOME: "/home/{{ user_name }}"
  tags:
    - install
    - dotfiles
    - stow

- name: Clone .dotfiles when absent
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: "/home/{{ user_name }}/.dotfiles"
    recursive: yes
    update: yes
    accept_hostkey: yes
    version: main
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  environment: "{{ {'HOME': '/home/' ~ user_name} | combine(dotfiles_git_environment if (bootstrap_ssh | bool) else {}) }}"
  when: not dotfiles_dir.stat.exists
  tags:
    - install
    - dotfiles
    - stow

- name: Update .dotfiles when checkout is clean
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: "/home/{{ user_name }}/.dotfiles"
    recursive: yes
    update: yes
    accept_hostkey: yes
    version: main
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  environment: "{{ {'HOME': '/home/' ~ user_name} | combine(dotfiles_git_environment if (bootstrap_ssh | bool) else {}) }}"
  when:
    - dotfiles_dir.stat.exists
    - dotfiles_status.stdout == ""
  tags:
    - install
    - dotfiles
    - stow

- name: Skip .dotfiles update when checkout has local changes
  ansible.builtin.debug:
    msg: "Skipping .dotfiles update because the checkout has local changes."
  when:
    - dotfiles_dir.stat.exists
    - dotfiles_status.stdout != ""
  tags:
    - install
    - dotfiles
    - stow

- name: Ensure ./linux script has execute permissions
  ansible.builtin.file:
    path: "/home/{{ user_name }}/.dotfiles/linux"
    mode: '0755'
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  tags:
    - install
    - dotfiles
    - stow

- name: Stow dotfiles
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  shell: cd /home/{{ user_name }}/.dotfiles && ./linux
  environment:
    HOME: "/home/{{ user_name }}"
    DOTFILES: "/home/{{ user_name }}/.dotfiles"
  tags:
    - install
    - dotfiles
    - stow
