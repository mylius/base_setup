- name: Install nodejs and npm (Debian/Ubuntu)
  become: "{{ bootstrap_become | bool }}"
  apt:
    name: ["nodejs", "npm"]
    update_cache: yes
  when:
    - bootstrap_become | bool
    - ansible_facts.packages.apt is defined
  tags:
    - install
    - node

- name: Install nodejs and npm (Arch/Manjaro)
  become: "{{ bootstrap_become | bool }}"
  pacman:
    name: ["nodejs", "npm"]
    update_cache: yes
  when:
    - bootstrap_become | bool
    - ansible_facts.packages.pacman is defined
  tags:
    - install
    - node

- name: Install nodejs and npm (macOS)
  homebrew:
    name: ["node"]
    state: present
  when: ansible_os_family == "Darwin" and brew_installed.stat.exists
  tags:
    - install
    - node

- name: Create npmjs prefix directory
  file:
    path: "/home/{{ user_name }}/.local/.npm-global"
    state: directory
    mode: '0755'
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  tags:
    - install
    - node

- name: Configure npmjs global prefix
  lineinfile:
    path: "/home/{{ user_name }}/.npmrc"
    line: "prefix=/home/{{ user_name }}/.local/.npm-global"
    create: yes
    mode: '0644'
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  tags:
    - install
    - node

- name: Download nvm installation script
  get_url:
    url: "https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.3/install.sh"
    dest: "/home/{{ user_name }}/install_nvm.sh"
    mode: '0755'
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  tags:
    - node

- name: Run nvm installation script
  shell: "bash /home/{{ user_name }}/install_nvm.sh"
  register: nvm_install_result
  ignore_errors: yes
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  tags:
    - node 

- name: Load nvm and install Node.js
  shell: |
    . /home/{{ user_name }}/.nvm/nvm.sh
    nvm install --lts
    nvm alias default lts/*
  args:
    executable: /bin/bash
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  tags:
    - node

- name: Ensure npm is installed
  shell: |
    . /home/{{ user_name }}/.nvm/nvm.sh
    npm install -g npm
  args:
    executable: /bin/bash
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
  tags:
    - node
