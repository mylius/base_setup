# Worktrunk - Git worktree manager
- name: Check if worktrunk is already installed
  ansible.builtin.command: wt --version
  register: worktrunk_installed
  changed_when: false
  failed_when: false
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Install worktrunk with Homebrew
  homebrew:
    name: worktrunk
    state: present
  when: ansible_os_family == "Darwin" and brew_installed.stat.exists

- name: Fetch latest worktrunk release metadata
  ansible.builtin.uri:
    url: https://api.github.com/repos/max-sixty/worktrunk/releases/latest
    return_content: true
  register: worktrunk_release
  when:
    - ansible_os_family != "Darwin"
