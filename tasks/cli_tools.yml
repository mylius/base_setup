    src: "{{ lazygit_binary.files[0].path }}"
    dest: "{{ cli_install_dir }}/lazygit"
    remote_src: true
    mode: '0755'
  when:
    - ansible_facts.packages.apt is defined
    - lazygit_installed.rc != 0
    - lazygit_binary.matched > 0
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Clean up lazygit temporary directory
  ansible.builtin.file:
    path: "{{ lazygit_tmpdir.path }}"
    state: absent
  when:
    - ansible_facts.packages.apt is defined
    - lazygit_installed.rc != 0
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"
