- name: Install starship with pacman
  ansible.builtin.pacman:
    name: starship
    state: present
    update_cache: yes
  when:
    - bootstrap_become | bool
    - ansible_facts.packages.pacman is defined

- name: Install starship with Homebrew
  homebrew:
    name: starship
    state: present
  when: ansible_os_family == "Darwin" and brew_installed.stat.exists

- name: Install starship with official installer on apt-based systems
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://starship.rs/install.sh | sh -s -- -y -b "{{ cli_install_dir }}"
  args:
    executable: /bin/bash
  when:
    - ansible_facts.packages.apt is defined
    - starship_installed.rc != 0
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Install starship with official installer on other Linux systems
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://starship.rs/install.sh | sh -s -- -y -b "{{ cli_install_dir }}"
  args:
    executable: /bin/bash
  when:
    - ansible_os_family != "Darwin"
    - ansible_facts.packages.apt is not defined
    - ansible_facts.packages.pacman is not defined
    - starship_installed.rc != 0
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

