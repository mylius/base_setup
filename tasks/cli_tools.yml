- name: Find worktrunk binary in extracted archive
  ansible.builtin.find:
    paths: "{{ worktrunk_tmpdir.path }}"
    patterns: "wt"
    file_type: file
    recurse: true
  register: worktrunk_binary
  when:
    - ansible_os_family != "Darwin"
    - worktrunk_installed.rc != 0
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Install worktrunk binary
  ansible.builtin.copy:
    src: "{{ worktrunk_binary.files[0].path }}"
    dest: "{{ cli_install_dir }}/wt"
    remote_src: true
    mode: '0755'
  when:
    - ansible_os_family != "Darwin"
    - worktrunk_installed.rc != 0
    - worktrunk_binary.matched > 0
