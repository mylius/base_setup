- name: Ensure user-local bin exists for non-privileged installs
  ansible.builtin.file:
    path: "{{ cli_install_dir }}"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0755'
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Check if starship is already installed
  ansible.builtin.command: starship --version
  register: starship_installed
  changed_when: false
  failed_when: false
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Check if zoxide is already installed
  ansible.builtin.command: zoxide --version
  register: zoxide_installed
  changed_when: false
  failed_when: false
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Install atuin with pacman
  ansible.builtin.pacman:
    name: atuin
    state: present
    update_cache: yes
  when:
    - bootstrap_become | bool
    - ansible_facts.packages.pacman is defined

- name: Install atuin with Homebrew
  homebrew:
    name: atuin
    state: present
  when: ansible_os_family == "Darwin" and brew_installed.stat.exists

- name: Check if atuin is already installed on apt-based systems
  ansible.builtin.command: atuin --version
  register: atuin_installed
  changed_when: false
  failed_when: false
  when: ansible_facts.packages.apt is defined

- name: Fetch latest atuin release metadata
  ansible.builtin.uri:
    url: https://api.github.com/repos/atuinsh/atuin/releases/latest
    return_content: true
  register: atuin_release
  when:
    - ansible_facts.packages.apt is defined
    - atuin_installed.rc != 0
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Create temporary directory for atuin install
  ansible.builtin.tempfile:
    state: directory
    suffix: atuin
  register: atuin_tmpdir
  when:
    - ansible_facts.packages.apt is defined
    - atuin_installed.rc != 0
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Download atuin release archive
  ansible.builtin.get_url:
    url: "https://github.com/atuinsh/atuin/releases/download/{{ atuin_release.json.tag_name }}/atuin-{{ atuin_release_target_map.get(ansible_architecture, 'x86_64-unknown-linux-gnu') }}.tar.gz"
    dest: "{{ atuin_tmpdir.path }}/atuin.tar.gz"
    mode: '0644'
  when:
    - ansible_facts.packages.apt is defined
    - atuin_installed.rc != 0
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Extract atuin release archive
  ansible.builtin.unarchive:
    src: "{{ atuin_tmpdir.path }}/atuin.tar.gz"
    dest: "{{ atuin_tmpdir.path }}"
    remote_src: true
  when:
    - ansible_facts.packages.apt is defined
    - atuin_installed.rc != 0
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Find atuin binary in extracted archive
  ansible.builtin.find:
    paths: "{{ atuin_tmpdir.path }}"
    patterns: atuin
    file_type: file
    recurse: true
  register: atuin_binary
  when:
    - ansible_facts.packages.apt is defined
    - atuin_installed.rc != 0
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Install atuin binary from extracted archive
  ansible.builtin.copy:
    src: "{{ atuin_binary.files[0].path }}"
    dest: "{{ cli_install_dir }}/atuin"
    remote_src: true
    mode: '0755'
  when:
    - ansible_facts.packages.apt is defined
    - atuin_installed.rc != 0
    - atuin_binary.matched > 0
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Clean up atuin temporary directory
  ansible.builtin.file:
    path: "{{ atuin_tmpdir.path }}"
    state: absent
  when:
    - ansible_facts.packages.apt is defined
    - atuin_installed.rc != 0
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

