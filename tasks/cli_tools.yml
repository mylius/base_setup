    - worktrunk_installed.rc != 0
  become: "{{ bootstrap_become | bool }}"
  become_user: "{{ user_name }}"

- name: Find worktrunk Linux x86_64 asset URL
  ansible.builtin.set_fact:
    worktrunk_asset_url: "{{ worktrunk_release.json.assets | selectattr('name', 'search', 'x86_64.*linux') | map(attribute='browser_download_url') | first }}"
