---
- name: Setup development environment
  hosts: localhost
  become: "{{ bootstrap_become | bool }}"

  vars:
    source_key: "./.ssh/id_rsa"
    user_name: "{{ user_name }}"
    bootstrap_become: false
    bootstrap_ssh: false
    dest_key: "/home/{{ user_name }}/.ssh/id_rsa"
    cli_install_dir: "/home/{{ user_name }}/.local/bin"
    dotfiles_repo: "https://github.com/mylius/.dotfiles.git"
    dotfiles_git_environment:
      GIT_SSH_COMMAND: "ssh -i /home/{{ user_name }}/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
    lazygit_release_arch_map:
      x86_64: x86_64
      aarch64: arm64
      arm64: arm64
    atuin_release_target_map:
      x86_64: x86_64-unknown-linux-gnu
      aarch64: aarch64-unknown-linux-gnu
      arm64: aarch64-unknown-linux-gnu
    miniforge_installer_map:
      x86_64: Miniforge3-Linux-x86_64.sh
      aarch64: Miniforge3-Linux-aarch64.sh
      arm64: Miniforge3-Linux-aarch64.sh

    # Common packages for all platforms
    common_packages:
      - zsh
      - tmux
      - neovim
      - jq
      - fzf
      - git
      - curl
      - figlet
      - stow

    # Debian/Ubuntu specific packages
    apt_packages:
      - build-essential
      - libssl-dev
      - i3
      - alacritty

    # Arch/Manjaro specific packages
    pacman_packages:
      - base-devel
      - openssl
      - i3-wm
      - alacritty

    # macOS specific packages
    brew_packages:
      - openssl
      - alacritty

  pre_tasks:
    - name: Gather package facts
      package_facts:
        manager: auto

    - name: Check if Homebrew is installed
      stat:
        path: /usr/local/bin/brew
      register: brew_installed
      when: ansible_os_family == "Darwin"

    - include_tasks:
        file: tasks/update_sources.yml
        apply:
          tags:
            - terminal
            - install
      tags: 
        - terminal
        - install
      when: ansible_os_family != "Darwin"

    - name: Detect current login shell on Linux
      command: getent passwd {{ user_name }}
      register: linux_user_entry
      changed_when: false
      failed_when: false
      when: ansible_os_family != "Darwin"

    - name: Detect current login shell on macOS
      command: dscl . -read /Users/{{ user_name }} UserShell
      register: darwin_user_shell
      changed_when: false
      failed_when: false
      when: ansible_os_family == "Darwin"

    - name: Record current login shell
      set_fact:
        current_login_shell: >-
          {{
            (
              linux_user_entry.stdout.split(':')[-1]
              if (
                ansible_os_family != 'Darwin' and
                (linux_user_entry.stdout | default('')) != ''
              )
              else (
                darwin_user_shell.stdout.split()[-1]
                if (
                  ansible_os_family == 'Darwin' and
                  (darwin_user_shell.stdout | default('')) != ''
                )
                else (ansible_env.SHELL | default('/bin/zsh'))
              )
            )
          }}

  tasks:
    - name: Install common and specific packages with apt
      apt:
        name: "{{ common_packages + apt_packages }}"
        state: present
        update_cache: yes
      when:
        - bootstrap_become | bool
        - ansible_facts.packages.apt is defined

    - name: Install common and specific packages with pacman
      pacman:
        name: "{{ common_packages + pacman_packages }}"
        state: present
        update_cache: yes
      when:
        - bootstrap_become | bool
        - ansible_facts.packages.pacman is defined

    - name: Install common and specific packages with Homebrew
      homebrew:
        name: "{{ common_packages + brew_packages }}"
        state: present
      when: ansible_os_family == "Darwin" and brew_installed.stat.exists

    - include_tasks:
        file: tasks/ssh.yml
        apply:
          tags:
            - ssh
      when: bootstrap_ssh | bool
      tags: ssh

    - include_tasks:
        file: tasks/git_setup.yml
        apply:
          tags:
            - install
      tags: install

    - include_tasks:
        file: tasks/cli_tools.yml
        apply:
          tags:
            - install
            - terminal
      tags:
        - install
        - terminal

    - include_tasks:
        file: tasks/nvim.yml
        apply:
          tags:
            - terminal
      tags: terminal

    - include_tasks:
        file: tasks/tmux_setup.yml
        apply:
          tags:
            - terminal
      tags: terminal

    - include_tasks:
        file: tasks/zsh_setup.yml
        apply:
          tags:
            - terminal
      when: (current_login_shell | default(ansible_env.SHELL | default('/bin/zsh')) | basename) != "bash"
      tags: terminal

    - include_tasks:
        file: tasks/bash_setup.yml
        apply:
          tags:
            - terminal
      when: (current_login_shell | default(ansible_env.SHELL | default('/bin/zsh')) | basename) == "bash"
      tags: terminal

    - include_tasks:
        file: tasks/dotfiles.yml
        apply:
          tags:
            - install
            - terminal
            - dotfiles
            - stow
      tags:
        - install
        - terminal
        - dotfiles
        - stow

    - include_tasks:
        file: tasks/python.yml
        apply:
          tags:
            - py
      tags: py

    - include_tasks:
        file: tasks/node.yml
        apply:
          tags:
            - node
      tags: node
